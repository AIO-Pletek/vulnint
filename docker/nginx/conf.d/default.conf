# VulnInt — frontend + API reverse proxy
# Listens on :80 (and :443 when TLS is enabled below). The default
# deployment terminates TLS at this NGINX; if you front it with a
# managed LB or Traefik, comment out the SSL server block.

# ─── HTTP → HTTPS redirect (enable when TLS is configured) ────────────────────
#server {
#    listen 80;
#    listen [::]:80;
#    server_name _;
#    return 301 https://$host$request_uri;
#}

# ─── Plain HTTP (use this when behind a TLS-terminating LB) ──────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Global proxy timeouts (per-location blocks can still override)
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Health probe used by docker-compose / load balancers
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Tightest limits on auth endpoints
    location = /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://vulnint_api;
        include /etc/nginx/conf.d/_proxy.inc;
    }

    # Inventory ingest — moderate, not as tight as login
    location = /api/v1/inventory {
        limit_req zone=ingest burst=10 nodelay;
        client_max_body_size 8m;
        proxy_read_timeout 120s;
        proxy_pass http://vulnint_api;
        include /etc/nginx/conf.d/_proxy.inc;
    }

    # All other API calls
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        proxy_pass http://vulnint_api;
        include /etc/nginx/conf.d/_proxy.inc;
    }

    # API docs
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://vulnint_api;
        include /etc/nginx/conf.d/_proxy.inc;
    }

    # Frontend (Next.js) — also handles _next static, websockets, etc.
    location / {
        proxy_pass http://vulnint_frontend;
        include /etc/nginx/conf.d/_proxy.inc;
        # Next.js websocket upgrade for HMR (dev only — harmless in prod)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Block dotfiles
    location ~ /\.(?!well-known) { deny all; }
}

